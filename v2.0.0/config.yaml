# Memory Maintenance 配置示例
# 将此文件保存为 ~/.openclaw/workspace/skills/memory-maintenance/config.yaml

# 记忆目录配置
memory_dir: "~/.openclaw/workspace/memory"
backup_dir: "backups"
archive_dir: "archived"

# 归档策略
archive_after_days: 30  # 30天无访问的记忆自动归档

# 智能归档策略
archive_policy:
  important_keywords: ["偏好", "决定", "重要", "记住", "关键", "必须", "一定", "永远", "核心"]
  min_access_count: 3  # 至少被访问过3次才考虑归档
  preserve_recent_active: 7  # 最近7天活跃的记忆不归档

# 去重配置
dedup_similarity_threshold: 0.85  # 相似度阈值（0.0-1.0）
# 0.85 表示 85% 相似即视为重复，低于此值会保留更多相似记忆

# 质量评分配置
quality_scoring:
  min_length: 50  # 最小长度，低于此值质量评分会降低
  max_length: 10000  # 最大长度，超过此值质量评分也会降低
  important_keywords_weight: 2.0  # 重要关键词的权重

# 自动标签配置
auto_tagging:
  enabled: true  # 是否启用自动标签
  categories: ["工作", "学习", "生活", "项目", "技术", "健康", "财务", "社交", "其他"]
  # 可以添加自定义关键词文件路径
  # keyword_file: "~/.openclaw/workspace/skills/memory-maintenance/keywords.yaml"

# ============================================
# 第二阶段功能配置
# ============================================

# 智能摘要与压缩
compression:
  enabled: false  # 是否启用智能摘要生成
  min_cluster_size: 3  # 最少需要多少个相似记忆才生成摘要
  similarity_threshold: 0.6  # 聚类相似度阈值

# 访问频率追踪
access_tracking:
  enabled: false  # 是否启用访问频率追踪
  log_file: "access.log"  # 访问日志文件名

# 交互式维护
interactive:
  enabled: false  # 是否启用交互式维护模式
  dry_run: true  # 预览将要执行的操作，但不实际执行

# ============================================
# 第三阶段功能配置
# ============================================

# 记忆关联图谱
memory_graph:
  enabled: true  # 是否启用关联图谱构建
  min_common_keywords: 2  # 最少共同关键词数
  max_links_per_node: 10  # 每个节点的最大链接数

# 健康度仪表盘
health_dashboard:
  enabled: true  # 是否启用健康仪表盘
  update_frequency: "daily"  # 更新频率

# 维护频率（cron 表达式）
# 每天凌晨 2:00 执行
# schedule: "0 2 * * *"
schedule: ""

# 报告配置
report:
  format: html  # "html" 或 "json"
  output_dir: "."

# 通知配置
notify:
  enabled: false
  method: "local"  # "local" 或 "webhook"
  webhook_url: ""
